<div class="max-w-7xl mx-auto p-6">
  <div class="mb-8 text-center">
    <h1 class="text-4xl font-bold mb-4">Available Flats</h1>

    <div class="flex gap-4">
<button (click)="goToLogin()" class="bg-gray-800 text-white px-5 py-2 rounded hover:bg-gray-900 transition">
  Login
</button>

    <div class="flex justify-end">
      <button *ngIf="isLoggedIn" routerLink="/my-bookings" class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700 transition">
        View My Bookings
      </button>
    </div>
  </div>

  <div class="mb-6 flex flex-wrap items-center gap-3 p-3 bg-white border border-gray-200 rounded-lg shadow-sm w-fit">
    <span class="text-sm font-semibold text-gray-500 mr-2">Filters:</span>
    
    <select [(ngModel)]="selectedTower" (change)="filterFlats()" class="border text-sm p-1.5 rounded w-32">
      <option value="">Tower</option>
      <option *ngFor="let tower of towers" [value]="tower">{{ tower }}</option>
    </select>

    <select [(ngModel)]="selectedLocation" (change)="filterFlats()" class="border text-sm p-1.5 rounded w-32">
      <option value="">Location</option>
      <option *ngFor="let location of locations" [value]="location">{{ location }}</option>
    </select>

    <select [(ngModel)]="selectedPriceRange" (change)="filterFlats()" class="border text-sm p-1.5 rounded w-32">
      <option value="">Price</option>
      <option *ngFor="let price of priceRanges" [value]="price">{{ price }}</option>
    </select>
  </div>

  <div *ngIf="loading" class="text-center text-gray-500 py-10">Loading flats...</div>
  <div *ngIf="errorMsg" class="text-center text-red-500 py-10">{{ errorMsg }}</div>

  <div *ngIf="flats && flats.length > 0" 
       class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    
    <div *ngFor="let flat of flats" 
         class="bg-white shadow-lg rounded-2xl overflow-hidden flex flex-col h-full transition-all duration-300 hover:shadow-2xl hover:scale-105 border border-gray-100">
      
      <img [src]="flat?.image" class="w-full h-64 object-cover" />
      
      <div class="p-6 flex flex-col h-full">
        <h2 class="text-2xl font-bold mb-2">🏠 Flat {{ flat?.flat_number }} <span class="text-lg font-medium text-gray-600">{{ flat?.flat_type }}</span></h2>
        <p class="text-gray-700 mb-1 text-lg">📍 {{ flat?.location }}</p>
        <p class="text-gray-700 mb-1 text-lg">🏢 Tower: {{ flat?.tower_name }}</p>
        <p class="text-gray-700 mb-2 text-lg">📍 Floor: {{ flat?.floor }}</p>
        <p class="text-2xl font-semibold text-gray-900 mb-3">💰 ₹{{ flat?.price }}</p>
        
        <div *ngIf="flat?.amenities" class="mb-4">
          <h3 class="font-semibold mb-1 text-lg">✨ Amenities:</h3>
          <p class="text-gray-600">{{ getAmenitiesText(flat?.amenities) }}</p>
        </div>

  <button *ngIf="!flat?.booking_status"

          class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded transition w-full">

<div class="mt-auto">
  <button 
    (click)="bookNow(flat.id)"
    [disabled]="flat?.booking_status === 'approved' || flat?.booking_status === 'pending'"
    class="text-white px-6 py-3 rounded w-full transition duration-300"
    [ngClass]="{
      'bg-green-600 hover:bg-green-700': !flat?.booking_status,
      'bg-yellow-600 cursor-not-allowed': flat?.booking_status === 'pending',
      'bg-red-600 cursor-not-allowed': flat?.booking_status === 'approved'
    }"
  >
    {{ 
      flat?.booking_status === 'pending' ? 'Pending Approval' : 
      flat?.booking_status === 'approved' ? 'Already Booked' : 
      'Book Now' 
    }}
  </button>
</div>
